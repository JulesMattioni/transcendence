# --- OAuth callback false-positive exclusions ---
# Google's OAuth "scope" param legitimately contains URLs and ".profile",
# which CRS misreads as LFI/RFI/RCE. Scope these removals to the OAuth
# callback paths only, so the WAF stays fully active everywhere else.

SecRule REQUEST_URI "@beginsWith /api/auth/oauth/" \
    "id:100010,phase:1,pass,nolog,\
    ctl:ruleRemoveTargetById=930120;ARGS:scope,\
    ctl:ruleRemoveTargetById=930121;REQUEST_HEADERS:Referer,\
    ctl:ruleRemoveTargetById=931130;ARGS:scope,\
    ctl:ruleRemoveTargetById=932206;REQUEST_HEADERS:Referer"
