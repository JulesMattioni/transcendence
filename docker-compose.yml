services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  vault:
    image: hashicorp/vault:1.16
    cap_add:
      - IPC_LOCK
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: ${VAULT_ROOT_TOKEN}
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"

  auth:
    build: ./auth
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  org:
    build: ./org
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8001:8000"

  core:
    build: ./core
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      org:
        condition: service_started
    ports:
      - "8002:8000"

  rag:
    build: ./rag
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      org:
        condition: service_started
      core:
        condition: service_started
    ports:
      - "8003:8000"

  realtime:
    build: ./realtime
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8004:8000"

  frontend-dev:
    profiles: [dev]
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  frontend-prod:
    profiles: [prod]
    build:
      context: ./frontend
      target: prod
    ports:
      - "8080:80"

  gateway:
    image: nginx:1.27-alpine
    depends_on:
      - auth
      - org
      - core
      - rag
      - realtime
    volumes:
      - ./gateway/conf/routing.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"

volumes:
  pgdata: