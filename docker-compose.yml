services:

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  auth:
    build:
      context: .
      dockerfile: auth/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    expose:
      - "8000"

  org:
    build:
      context: .
      dockerfile: org/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    expose:
      - "8000"

  core:
    build:
      context: .
      dockerfile: core/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      org:
        condition: service_started
      migrations:
        condition: service_completed_successfully
    volumes:
      - core_uploads:/app/uploads
    expose:
      - "8000"

  rag:
    build:
      context: .
      dockerfile: rag/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      org:
        condition: service_started
      core:
        condition: service_started
      migrations:
        condition: service_completed_successfully
    volumes:
      - core_uploads:/app/uploads:ro
    expose:
      - "8000"

  realtime:
    build:
      context: .
      dockerfile: realtime/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
    expose:
      - "8000"

  frontend-dev:
    profiles: [dev]
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    expose:
      - "5173"

  frontend-prod:
    profiles: [prod]
    build:
      context: ./frontend
      target: prod
    ports:
      - "8080:80"

  gateway:
    build: ./gateway
    depends_on:
      - auth
      - org
      - core
      - rag
      - realtime
    environment:
      PORT: "80"
      SSL_PORT: "443"
      SERVER_NAME: "localhost"
      BACKEND: "http://frontend-dev:5173"
      PROXY_SSL_CERT: /etc/nginx/conf/server.crt
      PROXY_SSL_CERT_KEY: /etc/nginx/conf/server.key
      MODSEC_RULE_ENGINE: "On"
    ports:
      - "8443:443"   # HTTPS
      - "8080:80"    # HTTP

  migrations:
    build:
      context: .
      dockerfile: migrations/Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations/alembic/versions:/app/alembic/versions
    restart: "no"

volumes:
  pgdata:
  core_uploads: